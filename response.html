<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phpEmail</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rizalcss@1.5.0/css/rizal.min.css" integrity="sha256-c+mRP5IEpihf3MvgbkG1cScBdbRoVQCW9PiGmS7uFA8=" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/jquery@3.6.3/dist/jquery.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
  <script defer src="https://kit.fontawesome.com/1e8d61f212.js"></script>
</head>
<body>
  <p class="center_absolute font_size_massive">Message Sent!</p>
  
  <script defer src="https://cdn.jsdelivr.net/npm/rizalcss@1.5.0/js/rizal.min.js" integrity="sha256-HBuvk3PCFCXtzy/G/393UvcosSWVy6WHf5sRnZdzmio=" crossorigin="anonymous"></script>
  <div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="authModalLabel">Bejelentkezés / Regisztráció</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
  
          <div id="login-view">
            <h4>Bejelentkezés</h4>
            <div class="mb-3">
              <input type="email" class="form-control" id="login-email" placeholder="Email cím">
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" id="login-password" placeholder="Jelszó">
            </div>
            <button class="btn btn-primary w-100" id="login-button">Bejelentkezés</button>
            <p class="text-center mt-3">Nincs még fiókod? <a href="#" id="show-reg-view">Regisztrálj!</a></p>
          </div>
  
          <div id="registration-view" style="display: none;">
            <h4>Regisztráció</h4>
            <div class="mb-3">
              <input type="email" class="form-control" id="reg-email" placeholder="Email cím">
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" id="reg-password" placeholder="Jelszó (min. 6 karakter)">
            </div>
            <button class="btn btn-success w-100" id="reg-button">Regisztráció</button>
            <p class="text-center mt-3">Van már fiókod? <a href="#" id="show-login-view">Jelentkezz be!</a></p>
          </div>
  
          <p id="error-message" class="text-danger mt-3"></p>
  
        </div>
      </div>
    </div>
  </div>
</body>

</html>
